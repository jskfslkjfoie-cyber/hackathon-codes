<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>고맘워요 (Mom's Safe) — 산모 앱</title>
<meta name="description" content="고위험 임산부 원스톱 보호 시스템 고맘워요 — 산모용 모바일 앱">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  html,body{background:#09090b}
  ::-webkit-scrollbar{width:0;height:0}
  .chip{display:inline-block;font-size:12px;padding:6px 12px;border-radius:20px;background:#1c1c22;border:1px solid #2a2a33;color:#9a9aa6;cursor:pointer;margin:0 6px 6px 0}
  .chip.on{background:rgba(159,224,184,.16);border-color:rgba(159,224,184,.5);color:#9fe0b8}
  .badge{display:inline-flex;align-items:center;font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px}
  input,textarea,select{background:#1c1c22;border:1px solid #2a2a33;color:#e9e9ee;border-radius:10px;padding:10px 12px;font-size:14px;width:100%}
  input:focus,textarea:focus{outline:none;border-color:#9fe0b8}
  input::placeholder,textarea::placeholder{color:#55555f}
</style>
</head>
<body class="text-zinc-100">

<div class="fixed inset-y-0 inset-x-0 max-w-md mx-auto bg-[#0a0a0c] flex flex-col overflow-hidden shadow-2xl">

  <header class="flex items-center gap-2 px-4 py-3 border-b border-zinc-800 flex-none">
    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-emerald-300 to-violet-300 flex items-center justify-center text-base">🤰</div>
    <div class="font-extrabold text-[15px]">고맘워요<span class="block text-[10px] font-medium text-zinc-500">Mom's Safe</span></div>
    <div id="hdr-risk" class="ml-auto"></div>
  </header>

  <main id="app" class="flex-1 overflow-y-auto px-4 py-4 pb-24"></main>

  <nav id="bottomnav" class="hidden flex-none grid grid-cols-4 border-t border-zinc-800 bg-[#0a0a0c]">
    <button data-go="APP-008" class="navbtn py-2.5 text-center text-[11px] text-zinc-500">🏠<br>홈</button>
    <button data-go="APP-004" class="navbtn py-2.5 text-center text-[11px] text-zinc-500">📝<br>증상일기</button>
    <button data-go="APP-006" class="navbtn py-2.5 text-center text-[11px] text-zinc-500">🏥<br>추천병원</button>
    <button data-go="APP-007" class="navbtn py-2.5 text-center text-[11px] text-zinc-500">🔔<br>알림</button>
  </nav>

  <div id="fab" class="hidden absolute bottom-24 right-4 flex flex-col gap-2 z-20">
    <a href="https://pf.kakao.com/_REPLACE_ME" target="_blank" rel="noopener" class="w-12 h-12 rounded-full bg-yellow-300 text-zinc-900 flex items-center justify-center text-xl shadow-lg">💬</a>
    <a href="tel:000-0000-0000" class="w-12 h-12 rounded-full bg-rose-400 text-zinc-900 flex items-center justify-center text-xl shadow-lg">📞</a>
  </div>
</div>

<script type="module">
import {
  DISEASES, SEVERITY, ACUTE_SIGNALS, grade,
  createPatient, getPatient, addDisease, listDiseases, addVital, listVitals,
  updateLocation, addHealthNote, addSymptomDiary, listDiaries, confirmDiaryVisit,
  listHospitals, hospitalPriority, saveRecommendations,
} from '/code/data.js';

let patientId = localStorage.getItem('momsafe_patient_id');
let patient = null;

const app = document.getElementById('app');
const bottomnav = document.getElementById('bottomnav');
const fab = document.getElementById('fab');

function esc(s) { return (s ?? '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function boot() {
  if (!patientId) { render('APP-001'); return; }
  patient = await getPatient(patientId);
  if (!patient) { localStorage.removeItem('momsafe_patient_id'); patientId = null; render('APP-001'); return; }
  bottomnav.classList.remove('hidden');
  fab.classList.remove('hidden');
  renderHeaderRisk();
  render('APP-008');
}

function renderHeaderRisk() {
  const r = patient?.risk;
  const hdr = document.getElementById('hdr-risk');
  if (!r) { hdr.innerHTML = ''; return; }
  const g = grade(r.clinical_score + r.infra_score + r.gestation_weight);
  hdr.innerHTML = `<span class="badge" style="background:${g.color}22;color:${g.color}">${g.label}</span>`;
}

document.querySelectorAll('.navbtn').forEach(b => b.addEventListener('click', () => render(b.dataset.go)));

async function render(screen) {
  document.querySelectorAll('.navbtn').forEach(b => b.classList.toggle('text-emerald-300', b.dataset.go === screen));
  document.querySelectorAll('.navbtn').forEach(b => b.classList.toggle('text-zinc-500', b.dataset.go !== screen));
  const screens = { 'APP-001': screenRegister, 'APP-002': screenDiagnosis, 'APP-003': screenVitals,
    'APP-004': screenDiary, 'APP-005': screenLocation, 'APP-006': screenHospitals,
    'APP-007': screenNotifications, 'APP-008': screenHome };
  app.scrollTop = 0;
  await screens[screen]();
}

/* ===================== APP-001 회원가입 / 등록 ===================== */
async function screenRegister() {
  app.innerHTML = `
    <div class="pt-6 pb-2"><h1 class="text-xl font-extrabold">고맘워요 시작하기</h1>
      <p class="text-zinc-500 text-sm mt-1">고위험 임산부 원스톱 보호 서비스 등록</p></div>
    <div class="space-y-4 mt-4">
      <div><label class="text-xs text-zinc-500 font-semibold">이름</label>
        <input id="r-name" class="mt-1.5" placeholder="홍길동" maxlength="50"></div>
      <div><label class="text-xs text-zinc-500 font-semibold">연락처</label>
        <input id="r-phone" class="mt-1.5" placeholder="010-0000-0000" maxlength="13"></div>
      <div><label class="text-xs text-zinc-500 font-semibold">분만 예정일</label>
        <input id="r-edd" type="date" class="mt-1.5"></div>
      <div class="flex items-center justify-between bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3">
        <span class="text-sm">다태아 (쌍둥이 등) 여부</span>
        <input id="r-multi" type="checkbox" class="w-5 h-5">
      </div>
      <label class="flex items-start gap-2 text-xs text-zinc-500">
        <input id="r-consent" type="checkbox" class="w-4 h-4 mt-0.5">
        개인정보 처리방침 및 긴급 이송망 배정용 위치기반 서비스 이용에 동의합니다.
      </label>
      <button id="r-submit" disabled class="w-full py-3.5 rounded-xl font-bold bg-zinc-800 text-zinc-500 disabled:opacity-50">가입 완료</button>
      <p id="r-err" class="text-rose-400 text-xs"></p>
    </div>`;

  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('r-edd').min = today;

  const phoneEl = document.getElementById('r-phone');
  phoneEl.addEventListener('input', () => {
    let v = phoneEl.value.replace(/[^0-9]/g, '').slice(0, 11);
    if (v.length > 7) v = `${v.slice(0,3)}-${v.slice(3,7)}-${v.slice(7)}`;
    else if (v.length > 3) v = `${v.slice(0,3)}-${v.slice(3)}`;
    phoneEl.value = v;
    validate();
  });
  const nameEl = document.getElementById('r-name'), eddEl = document.getElementById('r-edd'), consentEl = document.getElementById('r-consent');
  const submitBtn = document.getElementById('r-submit');
  function validate() {
    const nameOk = /^[가-힣a-zA-Z\s]{2,50}$/.test(nameEl.value.trim());
    const phoneOk = /^[0-9-]{10,13}$/.test(phoneEl.value) && phoneEl.value.replace(/-/g,'').length >= 10;
    const ok = nameOk && phoneOk && eddEl.value && consentEl.checked;
    submitBtn.disabled = !ok;
    submitBtn.classList.toggle('bg-emerald-300', ok);
    submitBtn.classList.toggle('text-zinc-900', ok);
    submitBtn.classList.toggle('bg-zinc-800', !ok);
    submitBtn.classList.toggle('text-zinc-500', !ok);
  }
  [nameEl, eddEl, consentEl].forEach(el => el.addEventListener('input', validate));
  consentEl.addEventListener('change', validate);

  submitBtn.addEventListener('click', async () => {
    submitBtn.disabled = true; submitBtn.textContent = '등록 중...';
    try {
      const id = await createPatient({
        name: nameEl.value.trim(), phone_number: phoneEl.value,
        expected_delivery_date: eddEl.value, multiple_pregnancy: document.getElementById('r-multi').checked,
      });
      localStorage.setItem('momsafe_patient_id', id);
      patientId = id; patient = await getPatient(id);
      bottomnav.classList.remove('hidden'); fab.classList.remove('hidden');
      render('APP-002');
    } catch (e) {
      document.getElementById('r-err').textContent = '등록 중 오류가 발생했습니다: ' + e.message;
      submitBtn.disabled = false; submitBtn.textContent = '가입 완료';
    }
  });
}

/* ===================== APP-002 진단서 업로드 ===================== */
async function screenDiagnosis() {
  app.innerHTML = `
    <div class="pt-2 pb-2"><h1 class="text-lg font-extrabold">진단서 업로드</h1>
      <p class="text-zinc-500 text-xs mt-1">19대 고위험 질환 진단서를 등록하면 실제위험도가 산출됩니다.</p></div>
    <div class="mt-3"><label class="text-xs text-zinc-500 font-semibold">질환명 선택 (다중 선택)</label>
      <div id="d-chips" class="mt-2"></div></div>
    <div class="mt-4"><label class="text-xs text-zinc-500 font-semibold">중증도</label>
      <div id="d-severity" class="flex gap-2 mt-2"></div></div>
    <div class="mt-4"><label class="text-xs text-zinc-500 font-semibold">진단서 파일 (JPG/PNG/PDF, 최대 10MB)</label>
      <input id="d-file" type="file" accept=".jpg,.jpeg,.png,.pdf" class="mt-2 text-xs"></div>
    <p id="d-err" class="text-rose-400 text-xs mt-2"></p>
    <button id="d-submit" disabled class="w-full py-3.5 rounded-xl font-bold bg-zinc-800 text-zinc-500 mt-4">등록 완료</button>
    <button id="d-skip" class="w-full py-3 rounded-xl font-semibold text-zinc-500 text-sm mt-2">건너뛰기</button>`;

  document.getElementById('d-chips').innerHTML = DISEASES.map(d =>
    `<span class="chip" data-name="${esc(d.name)}">${esc(d.name)}</span>`).join('');
  document.getElementById('d-severity').innerHTML = SEVERITY.map((s, i) =>
    `<label class="flex-1 text-center text-xs py-2.5 rounded-lg border border-zinc-700 cursor-pointer ${i===0?'sev-on':''}">
      <input type="radio" name="sev" value="${s.code}" class="hidden" ${i===0?'checked':''}>${s.label}</label>`).join('');

  let selectedFile = null;
  document.getElementById('d-file').addEventListener('change', (e) => {
    const f = e.target.files[0];
    if (f && f.size > 10 * 1024 * 1024) { document.getElementById('d-err').textContent = '파일은 10MB 이하만 업로드 가능합니다.'; e.target.value = ''; selectedFile = null; return; }
    document.getElementById('d-err').textContent = ''; selectedFile = f;
  });

  const chips = [...document.querySelectorAll('#d-chips .chip')];
  const submitBtn = document.getElementById('d-submit');
  chips.forEach(c => c.addEventListener('click', () => {
    c.classList.toggle('on');
    submitBtn.disabled = !chips.some(x => x.classList.contains('on'));
    submitBtn.classList.toggle('bg-emerald-300', !submitBtn.disabled);
    submitBtn.classList.toggle('text-zinc-900', !submitBtn.disabled);
  }));
  document.querySelectorAll('#d-severity label').forEach(l => l.addEventListener('click', () => {
    document.querySelectorAll('#d-severity label').forEach(x => x.classList.remove('sev-on', 'border-emerald-300'));
    l.classList.add('border-emerald-300');
  }));

  submitBtn.addEventListener('click', async () => {
    const names = chips.filter(c => c.classList.contains('on')).map(c => c.dataset.name);
    const severity = document.querySelector('input[name=sev]:checked').value;
    submitBtn.disabled = true; submitBtn.textContent = '저장 중...';
    for (const name of names) await addDisease(patientId, name, severity);
    patient = await getPatient(patientId);
    render('APP-008');
  });
  document.getElementById('d-skip').addEventListener('click', () => render('APP-008'));
}

/* ===================== APP-003 생체정보 입력 ===================== */
async function screenVitals() {
  const vitals = await listVitals(patientId);
  app.innerHTML = `
    <h1 class="text-lg font-extrabold pt-2">생체정보 입력</h1>
    <div class="grid grid-cols-2 gap-3 mt-4">
      <div><label class="text-xs text-zinc-500">수축기 혈압 (90~140 정상)</label><input id="v-sys" type="number" class="mt-1.5" placeholder="mmHg"></div>
      <div><label class="text-xs text-zinc-500">이완기 혈압 (60~90 정상)</label><input id="v-dia" type="number" class="mt-1.5" placeholder="mmHg"></div>
    </div>
    <div class="mt-3"><label class="text-xs text-zinc-500">혈당 (공복 기준 참고)</label><input id="v-sugar" type="number" class="mt-1.5" placeholder="mg/dL"></div>
    <button id="v-save" disabled class="w-full py-3.5 rounded-xl font-bold bg-zinc-800 text-zinc-500 mt-4">저장</button>
    <p id="v-warn" class="text-amber-400 text-xs mt-2"></p>
    <div class="mt-6"><p class="text-xs text-zinc-500 font-semibold mb-2">최근 7일 추이</p>
      <canvas id="v-chart" height="160"></canvas></div>`;

  const sys = document.getElementById('v-sys'), dia = document.getElementById('v-dia'), sugar = document.getElementById('v-sugar');
  const saveBtn = document.getElementById('v-save');
  function validate() {
    const ok = sys.value || dia.value || sugar.value;
    saveBtn.disabled = !ok;
    saveBtn.classList.toggle('bg-emerald-300', !!ok); saveBtn.classList.toggle('text-zinc-900', !!ok);
  }
  [sys, dia, sugar].forEach(el => el.addEventListener('input', validate));

  saveBtn.addEventListener('click', async () => {
    const s = +sys.value || null, d = +dia.value || null;
    await addVital(patientId, { systolic_bp: s, diastolic_bp: d, blood_sugar: +sugar.value || null });
    if (s > 140 || d > 90) document.getElementById('v-warn').textContent = '⚠ 혈압이 안전 기준치를 초과하여 실제위험도가 즉시 상향 반영됩니다.';
    patient = await getPatient(patientId);
    screenVitals();
  });

  const last7 = vitals.slice(0, 7).reverse();
  new Chart(document.getElementById('v-chart'), {
    type: 'line',
    data: {
      labels: last7.map((v, i) => `#${i+1}`),
      datasets: [
        { label: '수축기', data: last7.map(v => v.systolic_bp), borderColor: '#7db4ff', tension: .3 },
        { label: '이완기', data: last7.map(v => v.diastolic_bp), borderColor: '#bcb4f0', tension: .3 },
        { label: '혈당', data: last7.map(v => v.blood_sugar), borderColor: '#ffcf5c', tension: .3, yAxisID: 'y2' },
      ],
    },
    options: { scales: { y: { ticks: { color: '#9a9aa6' } }, y2: { position: 'right', ticks: { color: '#ffcf5c' } }, x: { ticks: { color: '#9a9aa6' } } },
      plugins: { legend: { labels: { color: '#e9e9ee' } } } },
  });
}

/* ===================== APP-004 증상 일기 ===================== */
async function screenDiary() {
  app.innerHTML = `
    <h1 class="text-lg font-extrabold pt-2">증상 일기</h1>
    <p class="text-zinc-500 text-xs mt-1">자유롭게 적어주세요. AI가 위험 신호를 분석합니다.</p>
    <textarea id="diary-text" rows="5" maxlength="500" class="mt-3" placeholder="예) 아침부터 머리가 아프고 눈앞이 흐릿해요. 배도 자주 뭉쳐요."></textarea>
    <div class="text-right text-[11px] text-zinc-500 mt-1"><span id="diary-count">0</span>/500</div>
    <button id="diary-submit" disabled class="w-full py-3.5 rounded-xl font-bold bg-zinc-800 text-zinc-500 mt-2">일기 등록</button>
    <div id="diary-result" class="mt-4"></div>`;

  const ta = document.getElementById('diary-text'), counter = document.getElementById('diary-count'), btn = document.getElementById('diary-submit');
  ta.addEventListener('input', () => {
    counter.textContent = ta.value.length;
    btn.disabled = !ta.value.trim();
    btn.classList.toggle('bg-emerald-300', !!ta.value.trim()); btn.classList.toggle('text-zinc-900', !!ta.value.trim());
  });
  btn.addEventListener('click', async () => {
    btn.disabled = true; btn.textContent = 'AI 분석 중...';
    const result = await addSymptomDiary(patientId, ta.value.trim());
    patient = await getPatient(patientId); renderHeaderRisk();
    const g = grade(result.pre_risk_score);
    document.getElementById('diary-result').innerHTML = `
      <div class="rounded-xl border p-4" style="border-color:${g.color}66;background:${g.color}14">
        <div class="flex justify-between items-center"><b style="color:${g.color}">예비위험도 · ${g.label}</b></div>
        <p class="text-xs text-zinc-400 mt-2">${esc(result.llm_summary)}</p>
        ${result.hospital_visit_recommended ? '<p class="text-amber-400 text-xs mt-2">→ 병원 방문을 권고드립니다. 알림 내역에서 확인해 주세요.</p>' : ''}
      </div>`;
    btn.textContent = '일기 등록'; btn.disabled = false; ta.value=''; counter.textContent='0';
  });
}

/* ===================== APP-005 체류 지역 업데이트 ===================== */
function pseudoGeocode(address) {
  let h = 0; for (const c of address) h = (h * 31 + c.charCodeAt(0)) >>> 0;
  return { latitude: 37.45 + (h % 1000) / 10000, longitude: 126.95 + ((h >> 8) % 1000) / 10000 };
}
async function screenLocation() {
  const loc = patient?.location || {};
  app.innerHTML = `
    <h1 class="text-lg font-extrabold pt-2">체류 지역 업데이트</h1>
    <div class="flex gap-2 mt-3">
      <label class="flex-1 text-center text-sm py-2.5 rounded-lg border border-zinc-700 cursor-pointer"><input type="radio" name="loctype" value="HOME" class="hidden" ${loc.location_type!=='TEMPORARY'?'checked':''}>거주지</label>
      <label class="flex-1 text-center text-sm py-2.5 rounded-lg border border-zinc-700 cursor-pointer"><input type="radio" name="loctype" value="TEMPORARY" class="hidden" ${loc.location_type==='TEMPORARY'?'checked':''}>임시체류지</label>
    </div>
    <div id="addr-wrap" class="mt-3 ${loc.location_type==='TEMPORARY'?'':'hidden'}">
      <label class="text-xs text-zinc-500">주소 검색</label>
      <input id="loc-addr" class="mt-1.5" placeholder="도로명 주소 입력" value="${esc(loc.address||'')}">
      <label class="text-xs text-zinc-500 mt-3 block">체류 종료 예정일 (미입력 시 +7일 자동)</label>
      <input id="loc-until" type="date" class="mt-1.5" value="${loc.stay_until||''}">
    </div>
    <button id="loc-save" class="w-full py-3.5 rounded-xl font-bold bg-emerald-300 text-zinc-900 mt-4">업데이트</button>
    <p id="loc-msg" class="text-emerald-400 text-xs mt-2"></p>`;

  document.querySelectorAll('input[name=loctype]').forEach(r => r.addEventListener('change', () => {
    document.getElementById('addr-wrap').classList.toggle('hidden', r.value !== 'TEMPORARY' && document.querySelector('input[name=loctype]:checked').value !== 'TEMPORARY');
    document.getElementById('addr-wrap').classList.toggle('hidden', document.querySelector('input[name=loctype]:checked').value !== 'TEMPORARY');
  }));

  document.getElementById('loc-save').addEventListener('click', async () => {
    const type = document.querySelector('input[name=loctype]:checked').value;
    const address = document.getElementById('loc-addr')?.value || '';
    const geo = type === 'TEMPORARY' && address ? pseudoGeocode(address) : { latitude: 37.5665, longitude: 126.9780 };
    await updateLocation(patientId, {
      location_type: type, address, latitude: geo.latitude, longitude: geo.longitude,
      stay_until: document.getElementById('loc-until')?.value || null, region_grade: 'ADEQUATE',
    });
    patient = await getPatient(patientId);
    document.getElementById('loc-msg').textContent = '✓ 위치가 갱신되어 추천 병원이 재계산되었습니다.';
  });
}

/* ===================== APP-006 추천 병원 확인 ===================== */
async function screenHospitals() {
  app.innerHTML = `<h1 class="text-lg font-extrabold pt-2">추천 병원</h1><div id="hosp-list" class="mt-3 space-y-3"></div>`;
  const loc = patient?.location || { latitude: 37.5665, longitude: 126.9780 };
  const hospitals = await listHospitals();
  const riskLevel = patient?.risk ? grade(patient.risk.clinical_score + patient.risk.infra_score + patient.risk.gestation_weight).key : 'LOW';
  const ranked = hospitalPriority(riskLevel, loc, hospitals);
  await saveRecommendations(patientId, ranked);
  document.getElementById('hosp-list').innerHTML = ranked.map(h => `
    <div class="rounded-xl border border-zinc-800 bg-zinc-900 p-4 flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-violet-300 text-zinc-900 font-extrabold flex items-center justify-center flex-none">${h.priority_rank}</div>
      <div class="flex-1 min-w-0">
        <b class="text-sm">${esc(h.hospital_name)}</b>
        <p class="text-[11px] text-zinc-500 mt-0.5">${h.distance_km}km · 약 ${h.eta_minutes}분 · NICU ${h.nicu_available_beds ?? 0}병상</p>
      </div>
      <a href="tel:${esc(h.emergency_phone || '0000000000')}" class="w-10 h-10 rounded-full bg-rose-400 text-zinc-900 flex items-center justify-center flex-none">📞</a>
    </div>`).join('') || '<p class="text-zinc-500 text-sm">추천 병원 정보를 불러오는 중입니다.</p>';
}

/* ===================== APP-007 알림 내역 ===================== */
async function screenNotifications() {
  app.innerHTML = `<h1 class="text-lg font-extrabold pt-2">알림 내역</h1><div id="noti-list" class="mt-3 space-y-3"></div>`;
  const diaries = await listDiaries(patientId);
  document.getElementById('noti-list').innerHTML = diaries.map(d => {
    const g = grade({LOW:0,MEDIUM:30,HIGH:50,EMERGENCY:80}[d.pre_risk_level] || 0);
    return `<div class="rounded-xl border border-zinc-800 bg-zinc-900 p-4">
      <div class="flex justify-between items-start gap-2">
        <span class="badge" style="background:${g.color}22;color:${g.color}">예비위험도 ${g.label}</span>
        <span class="text-[10px] text-zinc-500">${d.created_at?.toDate ? d.created_at.toDate().toLocaleString('ko-KR') : ''}</span>
      </div>
      <p class="text-xs text-zinc-400 mt-2">${esc(d.llm_summary)}</p>
      ${d.hospital_visit_recommended ? (d.visit_confirmed
        ? `<span class="inline-block mt-2 text-[11px] px-3 py-1 rounded-full bg-zinc-800 text-zinc-500">✓ 방문 완료 확인됨</span>`
        : `<button class="visit-btn mt-2 text-[11px] px-3 py-1.5 rounded-full bg-emerald-300 text-zinc-900 font-semibold" data-id="${d.diary_id}">방문 완료 표시</button>`) : ''}
    </div>`;
  }).join('') || '<p class="text-zinc-500 text-sm">알림 내역이 없습니다.</p>';

  document.querySelectorAll('.visit-btn').forEach(b => b.addEventListener('click', async () => {
    await confirmDiaryVisit(patientId, b.dataset.id);
    screenNotifications();
  }));
}

/* ===================== APP-008 내 위험도 현황 (홈) ===================== */
async function screenHome() {
  const r = patient?.risk;
  const total = r ? r.clinical_score + r.infra_score + r.gestation_weight : 0;
  const g = grade(total);
  const vitals = await listVitals(patientId);
  const latest = vitals[0];
  app.innerHTML = `
    <h1 class="text-lg font-extrabold pt-2">${esc(patient?.name||'')}님, 안녕하세요</h1>
    <p class="text-zinc-500 text-xs mt-1">임신 ${patient?.gestation_week ?? '-'}주차</p>
    <div class="rounded-2xl border p-5 mt-4" style="border-color:${g.color}66;background:${g.color}14">
      <p class="text-xs text-zinc-400">실제위험도</p>
      <div class="flex items-end gap-2 mt-1"><span class="text-3xl font-extrabold" style="color:${g.color}">${total}</span><span class="badge mb-1.5" style="background:${g.color}33;color:${g.color}">${g.label}</span></div>
      ${r?.pre_risk_level ? `<p class="text-xs text-amber-400 mt-2">예비위험도 ${r.pre_risk_level} 감지됨 — 증상일기 참고</p>` : ''}
    </div>
    <div class="grid grid-cols-2 gap-3 mt-4">
      <div class="rounded-xl bg-zinc-900 border border-zinc-800 p-3.5">
        <p class="text-[11px] text-zinc-500">최근 혈압</p>
        <p class="font-bold mt-1">${latest ? `${latest.systolic_bp??'-'}/${latest.diastolic_bp??'-'}` : '입력 없음'}</p>
      </div>
      <div class="rounded-xl bg-zinc-900 border border-zinc-800 p-3.5">
        <p class="text-[11px] text-zinc-500">관할 보건소</p>
        <p class="font-bold mt-1 text-[13px]">중앙보건소</p>
      </div>
    </div>
    <div class="grid grid-cols-3 gap-2 mt-4">
      <button data-go="APP-002" class="quick py-3 rounded-xl bg-zinc-900 border border-zinc-800 text-[11px]">📋<br>진단서</button>
      <button data-go="APP-003" class="quick py-3 rounded-xl bg-zinc-900 border border-zinc-800 text-[11px]">💓<br>생체정보</button>
      <button data-go="APP-005" class="quick py-3 rounded-xl bg-zinc-900 border border-zinc-800 text-[11px]">📍<br>체류지</button>
    </div>`;
  document.querySelectorAll('.quick').forEach(b => b.addEventListener('click', () => render(b.dataset.go)));
}

boot();
</script>
</body>
</html>
