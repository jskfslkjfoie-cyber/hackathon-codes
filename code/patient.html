<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root, [data-theme="light"]{
    --bg:#f3f4f6; --panel:#ffffff; --panel2:#edeff2; --line:#dde1e7;
    --txt:#16171a; --mut:#5a5e68; --dim:#878b94; --mom:#16a085;
  }
  [data-theme="dark"]{
    --bg:#0a0a0c; --panel:#141418; --panel2:#1c1c22; --line:#2a2a33;
    --txt:#e9e9ee; --mut:#9a9aa6; --dim:#6b6b76; --mom:#9fe0b8;
  }
  /* PRD: PC에서 폰 프레임(max-w-md) 양옆 여백을 어두운 톤으로 고정해, 라이트 테마에서도
     화면 중앙의 독립 스마트폰 앱처럼 보이게 한다. 프레임 내부는 테마(아래 규칙)를 따른다. */
  html,body{background:#0a0a0c;overflow-x:hidden}
  ::-webkit-scrollbar{width:0;height:0}
  .chip{display:inline-block;font-size:12px;padding:6px 12px;border-radius:20px;background:var(--panel2);border:1px solid var(--line);color:var(--mut);cursor:pointer;margin:0 6px 6px 0}
  .chip.on{background:rgba(22,160,133,.16);border-color:rgba(22,160,133,.5);color:var(--mom)}
  .badge{display:inline-flex;align-items:center;font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px}
  input,textarea,select{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:10px 12px;font-size:14px;width:100%}
  input:focus,textarea:focus{outline:none;border-color:var(--mom)}
  input::placeholder,textarea::placeholder{color:var(--dim)}

  /* 라이트 모드: Tailwind 다크 팔레트 유틸리티 클래스를 화면 곳곳에서 직접 사용하고 있어
     (다크모드 전제로 작성됨), 토글 시 보이는 색만 별도로 덮어쓴다. 강조색 위 고정 텍스트
     (text-zinc-900 on bg-emerald-300 등)처럼 버튼 자체 배경에 묶인 페어는 그대로 둔다. */
  /* 라이트 테마에서도 body(=PC 양옆 여백)는 위에서 고정한 어두운 톤을 유지하고,
     폰 프레임 내부(.bg-[#0a0a0c])만 밝은 배경으로 덮는다. */
  [data-theme="light"] .bg-\[\#0a0a0c\]{background-color:var(--bg) !important}
  [data-theme="light"] .bg-zinc-900{background-color:var(--panel) !important}
  [data-theme="light"] .bg-zinc-800{background-color:var(--panel2) !important}
  [data-theme="light"] .border-zinc-800,[data-theme="light"] .border-zinc-700{border-color:var(--line) !important}
  [data-theme="light"] .text-zinc-100{color:var(--txt) !important}
  [data-theme="light"] .text-zinc-400{color:var(--mut) !important}
  [data-theme="light"] .text-zinc-500{color:var(--dim) !important}
  [data-theme="light"] .text-emerald-300{color:#16a085 !important}
  [data-theme="light"] .text-emerald-400{color:#0f8a72 !important}
  [data-theme="light"] .border-emerald-300{border-color:#16a085 !important}
  [data-theme="light"] .text-rose-400{color:#c81e4e !important}
  [data-theme="light"] .text-amber-400{color:#a8730a !important}
</style>
</head>
<body class="text-zinc-100">

<div class="fixed inset-y-0 inset-x-0 max-w-md mx-auto bg-[#0a0a0c] flex flex-col overflow-hidden shadow-2xl">

  <header class="flex items-center gap-2 px-4 py-3 border-b border-zinc-800 flex-none">
    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-emerald-300 to-violet-300 flex items-center justify-center text-base">🤰</div>
    <div class="font-extrabold text-[15px]">고맘워요<span class="block text-[10px] font-medium text-zinc-500">Mom's Safe</span></div>
    <div id="hdr-risk" class="ml-auto"></div>
    <button id="theme-btn" class="w-8 h-8 rounded-lg flex items-center justify-center text-base flex-none" style="background:var(--panel2);border:1px solid var(--line)" title="화면 모드 전환" aria-label="라이트/다크 모드 전환"></button>
  </header>

  <main id="app" class="flex-1 overflow-y-auto px-4 py-4 pb-24"></main>

  <nav id="bottomnav" class="hidden flex-none grid grid-cols-5 border-t border-zinc-800 bg-[#0a0a0c]">
    <button data-go="APP-004" class="navbtn py-2.5 text-center text-[11px] text-zinc-500">🏠<br>홈</button>
    <button data-go="APP-005" class="navbtn py-2.5 text-center text-[11px] text-zinc-500">📝<br>증상일기</button>
    <button data-go="APP-003" class="navbtn py-2.5 text-center text-[11px] text-zinc-500">📋<br>진료정보</button>
    <button data-go="APP-006" class="navbtn py-2.5 text-center text-[11px] text-zinc-500">📍<br>체류지</button>
    <button data-go="APP-007" class="navbtn py-2.5 text-center text-[11px] text-zinc-500">🔔<br>알림</button>
  </nav>

  <div id="fab" class="hidden absolute bottom-24 right-4 flex flex-col gap-2 z-20">
    <a href="https://pf.kakao.com/_REPLACE_ME" target="_blank" rel="noopener" class="w-12 h-12 rounded-full bg-yellow-300 text-zinc-900 flex items-center justify-center text-xl shadow-lg">💬</a>
    <a href="tel:000-0000-0000" class="w-12 h-12 rounded-full bg-rose-400 text-zinc-900 flex items-center justify-center text-xl shadow-lg">📞</a>
  </div>
</div>

<script type="module">
import {
  DISEASES, DISEASE_AREAS, SEVERITY, ACUTE_SIGNALS, grade, bmiOf,
  createPatient, getPatient, updatePatientBasics, addDisease, listDiseases, addVital, listVitals,
  updateLocation, addHealthNote, addSymptomDiary, listDiaries, confirmDiaryVisit,
  listHospitals, hospitalPriority, saveRecommendations,
} from '/code/data.js';

let patientId = localStorage.getItem('momsafe_patient_id');
let patient = null;

const app = document.getElementById('app');
const bottomnav = document.getElementById('bottomnav');
const fab = document.getElementById('fab');

function esc(s) { return (s ?? '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

const themeBtn = document.getElementById('theme-btn');
function applyThemeButton() { themeBtn.textContent = document.documentElement.dataset.theme === 'dark' ? '☀️' : '🌙'; }
themeBtn.addEventListener('click', () => {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('momsafe-theme', next);
  applyThemeButton();
  if (currentScreen) render(currentScreen); // 차트(Chart.js)는 캔버스라 CSS로 못 덮어써서 재렌더로 색 갱신
});
applyThemeButton();

async function boot() {
  if (!patientId) { render('APP-001'); return; }
  patient = await getPatient(patientId);
  if (!patient) { localStorage.removeItem('momsafe_patient_id'); patientId = null; render('APP-001'); return; }
  bottomnav.classList.remove('hidden');
  fab.classList.remove('hidden');
  renderHeaderRisk();
  render('APP-004');
}

function renderHeaderRisk() {
  const r = patient?.risk;
  const hdr = document.getElementById('hdr-risk');
  if (!r) { hdr.innerHTML = ''; return; }
  const g = grade(r.clinical_score + r.infra_score + r.gestation_weight);
  hdr.innerHTML = `<span class="badge" style="background:${g.color}22;color:${g.color}">${g.label}</span>`;
}

document.querySelectorAll('.navbtn').forEach(b => b.addEventListener('click', () => render(b.dataset.go)));

let currentScreen = null;
async function render(screen) {
  currentScreen = screen;
  document.querySelectorAll('.navbtn').forEach(b => b.classList.toggle('text-emerald-300', b.dataset.go === screen));
  document.querySelectorAll('.navbtn').forEach(b => b.classList.toggle('text-zinc-500', b.dataset.go !== screen));
  const screens = { 'APP-001': screenRegister, 'APP-002': screenBasics, 'APP-003': screenMedical,
    'APP-004': screenHome, 'APP-005': screenDiary, 'APP-006': screenLocation,
    'APP-007': screenNotifications, 'APP-008': screenDetail };
  app.scrollTop = 0;
  await screens[screen]();
}

/* ===================== APP-001 회원가입 / 등록 ===================== */
async function screenRegister() {
  app.innerHTML = `
    <div class="pt-6 pb-2"><h1 class="text-xl font-extrabold">고맘워요 시작하기</h1>
      <p class="text-zinc-500 text-sm mt-1">고위험 임산부 원스톱 보호 서비스 등록</p></div>
    <div class="space-y-4 mt-4">
      <div><label class="text-xs text-zinc-500 font-semibold">이름</label>
        <input id="r-name" class="mt-1.5" placeholder="홍길동" maxlength="50"></div>
      <div><label class="text-xs text-zinc-500 font-semibold">연락처</label>
        <input id="r-phone" class="mt-1.5" placeholder="010-0000-0000" maxlength="13"></div>
      <div><label class="text-xs text-zinc-500 font-semibold">분만 예정일</label>
        <input id="r-edd" type="date" class="mt-1.5"></div>
      <div class="flex items-center justify-between bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3">
        <span class="text-sm">다태아 (쌍둥이 등) 여부</span>
        <input id="r-multi" type="checkbox" class="w-5 h-5">
      </div>
      <label class="flex items-start gap-2 text-xs text-zinc-500">
        <input id="r-consent" type="checkbox" class="w-4 h-4 mt-0.5">
        개인정보 처리방침 및 긴급 이송망 배정용 위치기반 서비스 이용에 동의합니다.
      </label>
      <button id="r-submit" disabled class="w-full py-3.5 rounded-xl font-bold bg-zinc-800 text-zinc-500 disabled:opacity-50">가입 완료</button>
      <p id="r-err" class="text-rose-400 text-xs"></p>
    </div>`;

  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('r-edd').min = today;

  const phoneEl = document.getElementById('r-phone');
  phoneEl.addEventListener('input', () => {
    let v = phoneEl.value.replace(/[^0-9]/g, '').slice(0, 11);
    if (v.length > 7) v = `${v.slice(0,3)}-${v.slice(3,7)}-${v.slice(7)}`;
    else if (v.length > 3) v = `${v.slice(0,3)}-${v.slice(3)}`;
    phoneEl.value = v;
    validate();
  });
  const nameEl = document.getElementById('r-name'), eddEl = document.getElementById('r-edd'), consentEl = document.getElementById('r-consent');
  const submitBtn = document.getElementById('r-submit');
  function validate() {
    const nameOk = /^[가-힣a-zA-Z\s]{2,50}$/.test(nameEl.value.trim());
    const phoneOk = /^[0-9-]{10,13}$/.test(phoneEl.value) && phoneEl.value.replace(/-/g,'').length >= 10;
    const ok = nameOk && phoneOk && eddEl.value && consentEl.checked;
    submitBtn.disabled = !ok;
    submitBtn.classList.toggle('bg-emerald-300', ok);
    submitBtn.classList.toggle('text-zinc-900', ok);
    submitBtn.classList.toggle('bg-zinc-800', !ok);
    submitBtn.classList.toggle('text-zinc-500', !ok);
  }
  [nameEl, eddEl, consentEl].forEach(el => el.addEventListener('input', validate));
  consentEl.addEventListener('change', validate);

  submitBtn.addEventListener('click', async () => {
    submitBtn.disabled = true; submitBtn.textContent = '등록 중...';
    try {
      const id = await createPatient({
        name: nameEl.value.trim(), phone_number: phoneEl.value,
        expected_delivery_date: eddEl.value, multiple_pregnancy: document.getElementById('r-multi').checked,
      });
      localStorage.setItem('momsafe_patient_id', id);
      patientId = id; patient = await getPatient(id);
      bottomnav.classList.remove('hidden'); fab.classList.remove('hidden');
      render('APP-002'); // 기본 인적정보(BMI) 입력으로
    } catch (e) {
      document.getElementById('r-err').textContent = '등록 중 오류가 발생했습니다: ' + e.message;
      submitBtn.disabled = false; submitBtn.textContent = '가입 완료';
    }
  });
}

/* ===================== APP-002 기본 인적정보 (키·몸무게 → BMI) ===================== */
async function screenBasics() {
  const wk = patient?.gestation_week ?? '-';
  app.innerHTML = `
    <div class="pt-2 pb-2"><h1 class="text-lg font-extrabold">기본 인적정보</h1>
      <p class="text-zinc-500 text-xs mt-1">임신 주수는 분만예정일 기준으로 자동 계산됩니다.</p></div>
    <div class="rounded-xl bg-zinc-900 border border-zinc-800 p-4 mt-3">
      <p class="text-[11px] text-zinc-500">임신 주수</p>
      <p class="font-bold text-lg mt-0.5">${wk}주차</p>
    </div>
    <div class="grid grid-cols-2 gap-3 mt-4">
      <div><label class="text-xs text-zinc-500 font-semibold">키 (cm)</label>
        <input id="b-height" type="number" inputmode="decimal" class="mt-1.5" placeholder="예) 162" value="${patient?.height_cm ?? ''}"></div>
      <div><label class="text-xs text-zinc-500 font-semibold">몸무게 (kg)</label>
        <input id="b-weight" type="number" inputmode="decimal" class="mt-1.5" placeholder="예) 58" value="${patient?.weight_kg ?? ''}"></div>
    </div>
    <div class="rounded-xl bg-zinc-900 border border-zinc-800 p-4 mt-3 flex items-center justify-between">
      <span class="text-sm text-zinc-400">BMI (자동 산출)</span>
      <span id="b-bmi" class="font-extrabold text-lg">${patient?.bmi ?? '-'}</span>
    </div>
    <button id="b-submit" disabled class="w-full py-3.5 rounded-xl font-bold bg-zinc-800 text-zinc-500 mt-5">다음</button>`;

  const h = document.getElementById('b-height'), w = document.getElementById('b-weight');
  const bmiEl = document.getElementById('b-bmi'), btn = document.getElementById('b-submit');
  function upd() {
    const v = bmiOf(w.value, h.value);
    bmiEl.textContent = v ?? '-';
    const ok = +h.value >= 120 && +h.value <= 210 && +w.value >= 30 && +w.value <= 200;
    btn.disabled = !ok;
    btn.classList.toggle('bg-emerald-300', ok); btn.classList.toggle('text-zinc-900', ok);
    btn.classList.toggle('bg-zinc-800', !ok); btn.classList.toggle('text-zinc-500', !ok);
  }
  [h, w].forEach(el => el.addEventListener('input', upd)); upd();
  btn.addEventListener('click', async () => {
    btn.disabled = true; btn.textContent = '저장 중...';
    await updatePatientBasics(patientId, { height_cm: h.value, weight_kg: w.value });
    patient = await getPatient(patientId);
    render('APP-003');
  });
}

/* ===================== APP-003 진료정보입력 (2트랙 + 생체정보) ===================== */
// 실 OCR 백엔드가 없어, 업로드 파일명에서 질환명 키워드를 뽑아내는 데모 휴리스틱으로
// "AI 진단서 해석"을 시뮬레이션한다(증상일기 classifySymptomDiary와 동일한 접근).
function simulateOcr(filename) {
  const base = (filename || '').replace(/\.[^.]+$/, '');
  return DISEASES.filter(d => base.includes(d.name)).map(d => d.name);
}
async function screenMedical() {
  app.innerHTML = `
    <div class="pt-2 pb-2"><h1 class="text-lg font-extrabold">진료정보입력</h1>
      <p class="text-zinc-500 text-xs mt-1">진단서 또는 직접 입력으로 위험요소를 등록하면 실제위험도가 산출됩니다.</p></div>

    <div class="flex gap-1 p-1 rounded-xl bg-zinc-900 border border-zinc-800 mt-2">
      <button id="tab-ocr" class="med-tab flex-1 py-2 rounded-lg text-xs font-bold bg-zinc-800 text-zinc-100">진단서로 등록하기</button>
      <button id="tab-manual" class="med-tab flex-1 py-2 rounded-lg text-xs font-bold text-zinc-500">직접 입력</button>
    </div>

    <!-- OCR 트랙 -->
    <div id="track-ocr" class="mt-4">
      <label class="text-xs text-zinc-500 font-semibold">진단서 파일 (JPG/PNG/PDF, 최대 10MB)</label>
      <input id="ocr-file" type="file" accept=".jpg,.jpeg,.png,.pdf" class="mt-2 text-xs">
      <div id="ocr-status" class="text-xs text-zinc-500 mt-2"></div>
      <div id="ocr-result" class="mt-2 hidden">
        <p class="text-xs text-emerald-400 font-semibold mb-1">자동 인식 결과 — 확인·보정하세요</p>
        <div id="ocr-chips"></div>
      </div>
    </div>

    <!-- 직접 입력 트랙 -->
    <div id="track-manual" class="mt-4 hidden">
      <label class="text-xs text-zinc-500 font-semibold">위험요소 영역</label>
      <div id="area-radio" class="grid grid-cols-2 gap-2 mt-2"></div>
      <label class="text-xs text-zinc-500 font-semibold mt-3 block">위험요소 항목</label>
      <select id="dz-select" class="mt-1.5"><option value="">영역을 먼저 선택하세요</option></select>
      <button id="dz-add" class="w-full py-2.5 rounded-xl font-semibold text-sm bg-zinc-800 text-zinc-300 mt-2">+ 항목 추가</button>
      <div id="dz-picked" class="mt-3"></div>
    </div>

    <div class="mt-5"><label class="text-xs text-zinc-500 font-semibold">중증도 (Grade)</label>
      <div id="d-severity" class="flex gap-2 mt-2"></div></div>
    <p id="d-err" class="text-rose-400 text-xs mt-2"></p>
    <button id="d-submit" disabled class="w-full py-3.5 rounded-xl font-bold bg-zinc-800 text-zinc-500 mt-3">등록 완료</button>

    <div class="h-px bg-zinc-800 my-6"></div>

    <!-- 생체정보 -->
    <h2 class="text-base font-extrabold">생체정보 입력</h2>
    <div class="grid grid-cols-2 gap-3 mt-3">
      <div><label class="text-xs text-zinc-500">수축기 혈압</label><input id="v-sys" type="number" class="mt-1.5" placeholder="mmHg"></div>
      <div><label class="text-xs text-zinc-500">이완기 혈압</label><input id="v-dia" type="number" class="mt-1.5" placeholder="mmHg"></div>
    </div>
    <div class="grid grid-cols-2 gap-3 mt-3">
      <div><label class="text-xs text-zinc-500">혈당 (mg/dL)</label><input id="v-sugar" type="number" class="mt-1.5" placeholder="mg/dL"></div>
      <div><label class="text-xs text-zinc-500">체중 (kg)</label><input id="v-weight" type="number" class="mt-1.5" placeholder="kg"></div>
    </div>
    <button id="v-save" disabled class="w-full py-3.5 rounded-xl font-bold bg-zinc-800 text-zinc-500 mt-4">생체정보 저장</button>
    <p id="v-warn" class="text-amber-400 text-xs mt-2"></p>
    <div class="mt-5"><p class="text-xs text-zinc-500 font-semibold mb-2">최근 7일 추이</p>
      <canvas id="v-chart" height="160"></canvas></div>`;

  // --- 중증도 ---
  document.getElementById('d-severity').innerHTML = SEVERITY.map((s, i) =>
    `<label class="flex-1 text-center text-xs py-2.5 rounded-lg border border-zinc-700 cursor-pointer ${i===0?'border-emerald-300':''}">
      <input type="radio" name="sev" value="${s.code}" class="hidden" ${i===0?'checked':''}>${s.label}</label>`).join('');
  document.querySelectorAll('#d-severity label').forEach(l => l.addEventListener('click', () => {
    document.querySelectorAll('#d-severity label').forEach(x => x.classList.remove('border-emerald-300'));
    l.classList.add('border-emerald-300');
  }));

  // --- 탭 전환 ---
  let track = 'ocr';
  const submitBtn = document.getElementById('d-submit');
  function refreshSubmit() {
    const has = track === 'ocr'
      ? [...document.querySelectorAll('#ocr-chips .chip.on')].length > 0
      : picked.size > 0;
    submitBtn.disabled = !has;
    submitBtn.classList.toggle('bg-emerald-300', has); submitBtn.classList.toggle('text-zinc-900', has);
    submitBtn.classList.toggle('bg-zinc-800', !has); submitBtn.classList.toggle('text-zinc-500', !has);
  }
  function setTrack(t) {
    track = t;
    document.getElementById('track-ocr').classList.toggle('hidden', t !== 'ocr');
    document.getElementById('track-manual').classList.toggle('hidden', t !== 'manual');
    document.getElementById('tab-ocr').classList.toggle('bg-zinc-800', t === 'ocr');
    document.getElementById('tab-ocr').classList.toggle('text-zinc-100', t === 'ocr');
    document.getElementById('tab-ocr').classList.toggle('text-zinc-500', t !== 'ocr');
    document.getElementById('tab-manual').classList.toggle('bg-zinc-800', t === 'manual');
    document.getElementById('tab-manual').classList.toggle('text-zinc-100', t === 'manual');
    document.getElementById('tab-manual').classList.toggle('text-zinc-500', t !== 'manual');
    refreshSubmit();
  }
  document.getElementById('tab-ocr').addEventListener('click', () => setTrack('ocr'));
  document.getElementById('tab-manual').addEventListener('click', () => setTrack('manual'));

  // --- OCR 트랙 ---
  document.getElementById('ocr-file').addEventListener('change', (e) => {
    const f = e.target.files[0];
    const status = document.getElementById('ocr-status'), result = document.getElementById('ocr-result');
    if (!f) return;
    if (f.size > 10 * 1024 * 1024) { document.getElementById('d-err').textContent = '파일은 10MB 이하만 업로드 가능합니다.'; e.target.value = ''; return; }
    document.getElementById('d-err').textContent = '';
    status.textContent = '🤖 AI가 진단서를 해석하고 있습니다...';
    result.classList.add('hidden');
    setTimeout(() => {
      const found = simulateOcr(f.name);
      status.textContent = found.length ? '✓ 해석 완료 — 인식된 질환을 확인하세요.' : '인식된 질환이 없습니다. 아래에서 직접 선택하거나 "직접 입력" 탭을 이용하세요.';
      result.classList.remove('hidden');
      document.getElementById('ocr-chips').innerHTML = DISEASES.map(d =>
        `<span class="chip ${found.includes(d.name)?'on':''}" data-name="${esc(d.name)}">${esc(d.name)}</span>`).join('');
      document.querySelectorAll('#ocr-chips .chip').forEach(c => c.addEventListener('click', () => { c.classList.toggle('on'); refreshSubmit(); }));
      refreshSubmit();
    }, 1200);
  });

  // --- 직접 입력 트랙 ---
  const picked = new Map(); // name -> true
  document.getElementById('area-radio').innerHTML = DISEASE_AREAS.map((a, i) =>
    `<label class="text-center text-xs py-2.5 rounded-lg border border-zinc-700 cursor-pointer">
      <input type="radio" name="area" value="${a.code}" class="hidden">${esc(a.label)}</label>`).join('');
  document.querySelectorAll('#area-radio label').forEach(l => l.addEventListener('click', () => {
    document.querySelectorAll('#area-radio label').forEach(x => x.classList.remove('border-emerald-300'));
    l.classList.add('border-emerald-300');
    const code = l.querySelector('input').value;
    const opts = DISEASES.filter(d => d.area === code);
    document.getElementById('dz-select').innerHTML = opts.map(d => `<option value="${esc(d.name)}">${esc(d.name)} — ${esc(d.desc)}</option>`).join('');
  }));
  function renderPicked() {
    document.getElementById('dz-picked').innerHTML = [...picked.keys()].map(n =>
      `<span class="chip on" data-name="${esc(n)}">${esc(n)} ✕</span>`).join('');
    document.querySelectorAll('#dz-picked .chip').forEach(c => c.addEventListener('click', () => { picked.delete(c.dataset.name); renderPicked(); refreshSubmit(); }));
  }
  document.getElementById('dz-add').addEventListener('click', () => {
    const v = document.getElementById('dz-select').value;
    if (v) { picked.set(v, true); renderPicked(); refreshSubmit(); }
  });

  // --- 등록 완료 ---
  submitBtn.addEventListener('click', async () => {
    const severity = document.querySelector('input[name=sev]:checked').value;
    const names = track === 'ocr'
      ? [...document.querySelectorAll('#ocr-chips .chip.on')].map(c => c.dataset.name)
      : [...picked.keys()];
    const method = track === 'ocr' ? 'OCR' : 'MANUAL';
    submitBtn.disabled = true; submitBtn.textContent = '저장 중...';
    for (const name of names) await addDisease(patientId, name, severity, method);
    patient = await getPatient(patientId); renderHeaderRisk();
    render('APP-004');
  });

  // --- 생체정보 ---
  const sys = document.getElementById('v-sys'), dia = document.getElementById('v-dia'), sugar = document.getElementById('v-sugar'), weight = document.getElementById('v-weight');
  const saveBtn = document.getElementById('v-save');
  function vv() {
    const ok = sys.value || dia.value || sugar.value || weight.value;
    saveBtn.disabled = !ok;
    saveBtn.classList.toggle('bg-emerald-300', !!ok); saveBtn.classList.toggle('text-zinc-900', !!ok);
  }
  [sys, dia, sugar, weight].forEach(el => el.addEventListener('input', vv));
  saveBtn.addEventListener('click', async () => {
    const s = +sys.value || null, d = +dia.value || null;
    await addVital(patientId, { systolic_bp: s, diastolic_bp: d, blood_sugar: +sugar.value || null, weight_kg: +weight.value || null });
    if (s > 140 || d > 90) document.getElementById('v-warn').textContent = '⚠ 혈압이 안전 기준치를 초과하여 실제위험도가 즉시 상향 반영됩니다.';
    patient = await getPatient(patientId); renderHeaderRisk();
    render('APP-003');
  });

  const vitals = await listVitals(patientId);
  const last7 = vitals.slice(0, 7).reverse();
  const isDark = document.documentElement.dataset.theme === 'dark';
  const cc = { blue: isDark?'#7db4ff':'#2563eb', purple: isDark?'#bcb4f0':'#6d5fd8', amber: isDark?'#ffcf5c':'#a8730a', txt: isDark?'#e9e9ee':'#16171a', mut: isDark?'#9a9aa6':'#5a5e68' };
  new Chart(document.getElementById('v-chart'), {
    type: 'line',
    data: { labels: last7.map((v, i) => `#${i+1}`),
      datasets: [
        { label: '수축기', data: last7.map(v => v.systolic_bp), borderColor: cc.blue, tension: .3 },
        { label: '이완기', data: last7.map(v => v.diastolic_bp), borderColor: cc.purple, tension: .3 },
        { label: '혈당', data: last7.map(v => v.blood_sugar), borderColor: cc.amber, tension: .3, yAxisID: 'y2' },
      ] },
    options: { scales: { y: { ticks: { color: cc.mut } }, y2: { position: 'right', ticks: { color: cc.amber } }, x: { ticks: { color: cc.mut } } },
      plugins: { legend: { labels: { color: cc.txt } } } },
  });
}

function pseudoGeocode(address) {
  let h = 0; for (const c of address) h = (h * 31 + c.charCodeAt(0)) >>> 0;
  return { latitude: 37.45 + (h % 1000) / 10000, longitude: 126.95 + ((h >> 8) % 1000) / 10000 };
}
